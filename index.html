<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kreator Instrukcji Sterowania Oświetleniem</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html-docx-js@0.3.1/dist/html-docx.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
</head>
<body>

<header id="topbar">
  <div id="topbar-left">
    <div id="logo-mark">💡</div>
    <div>
      <div id="app-title">Kreator Instrukcji</div>
      <div id="app-sub">sterowanie oświetleniem</div>
    </div>
  </div>
  <div id="topbar-actions">
    <button id="btnClear" class="btn-secondary">🗑 Wyczyść</button>
    <button id="btnPDF" class="btn-primary">⬇ Eksportuj PDF</button>
    <button id="btnDOCX" class="btn-primary">📄 Eksportuj DOCX</button>
  </div>
</header>

<div id="layout">

  <!-- LEWA KOLUMNA: EDYTOR -->
  <div id="editor">

    <section class="card">
      <h2 class="section-title">📋 Podstawowe informacje</h2>
      <div class="field">
        <label for="docTitle">Tytuł instrukcji</label>
        <input type="text" id="docTitle" placeholder="np. Instrukcja obsługi panelu oświetlenia">
      </div>
      <div class="field-row">
        <div class="field">
          <label for="docLocation">Lokalizacja / obiekt</label>
          <input type="text" id="docLocation" placeholder="np. Biuro 3.02, Hala B">
        </div>
        <div class="field">
          <label for="docPanel">Model panelu</label>
          <select id="docPanel">
            <option value="">— wybierz —</option>
            <option value="E2D">E2D</option>
            <option value="Helvar">Helvar</option>
            <option value="WAGO">WAGO</option>
            <option value="DALI">DALI (ogólny)</option>
            <option value="KNX">KNX</option>
            <option value="Inny">Inny</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label for="docNote">Uwaga globalna <span class="optional">(opcjonalnie)</span></label>
        <textarea id="docNote" rows="2" placeholder="np. Brak ruchu przez 20 min → automatyczne wyłączenie (NOPRESENS)"></textarea>
      </div>
      <div class="field">
        <label>Rzut pomieszczenia <span class="optional">(opcjonalnie)</span></label>
        <div class="upload-area">
          <label class="btn-upload" for="floorPlanInput">
            🗺 Wybierz zdjęcie / rzut
          </label>
          <input type="file" id="floorPlanInput" accept="image/*" style="display:none">
          <button class="btn-img-remove" id="btnRemoveFloorPlan" style="display:none">✕ Usuń rzut</button>
        </div>
        <img id="floorPlanPreview" src="" alt="Rzut pomieszczenia" class="floor-plan-thumb" style="display:none">
      </div>
    </section>

    <section class="card">
      <div class="section-header">
        <h2 class="section-title">🎛 Panel — przyciski</h2>
        <button id="btnAddPanel" class="btn-add">+ Dodaj panel</button>
      </div>
      <p class="hint">Każdy panel to fizyczny przycisk ścienny. Dodaj tyle paneli ile masz w pomieszczeniu.</p>
      <div id="panelsContainer"></div>
    </section>

    <section class="card">
      <div class="section-header">
        <h2 class="section-title">🌡 Sensory / czujniki <span class="optional">(opcjonalnie)</span></h2>
        <button id="btnAddSensor" class="btn-add">+ Dodaj sensor</button>
      </div>
      <div id="sensorsContainer"></div>
    </section>

    <section class="card">
      <h2 class="section-title">⚠️ Dodatkowe uwagi / scenariusze</h2>
      <div id="notesContainer"></div>
      <button id="btnAddNote" class="btn-add">+ Dodaj uwagę</button>
    </section>

  </div>

  <!-- PRAWA KOLUMNA: PODGLĄD -->
  <div id="preview-col">
    <div id="preview-sticky">
      <div id="preview-label">Podgląd instrukcji</div>
      <div id="preview-doc">
        <div id="preview-content"></div>
      </div>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
